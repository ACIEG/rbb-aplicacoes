# Rede Besu local compatível com RBB (QBFT, 3 validators)
# Uso: ./scripts/start.sh | ./scripts/stop.sh | ./scripts/reset.sh

services:
  node01:
    image: hyperledger/besu:24.10.0
    container_name: rbb-local-node01
    restart: unless-stopped
    volumes:
      - ./genesis.json:/config/genesis.json:ro
      - ./nodes/node01:/config/node:ro
      - node01-data:/data
    ports:
      - "8545:8545"      # JSON-RPC HTTP
      - "8546:8546"      # JSON-RPC WS
      - "30303:30303"    # P2P
      - "30303:30303/udp"
    networks:
      - rbb-local
    command:
      - --genesis-file=/config/genesis.json
      - --data-path=/data
      - --node-private-key-file=/config/node/key
      - --p2p-host=0.0.0.0
      - --p2p-port=30303
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-cors-origins=*
      - --rpc-http-api=ETH,NET,WEB3,QBFT,ADMIN,DEBUG,TRACE,TXPOOL
      - --rpc-ws-enabled=true
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,WEB3,QBFT
      - --host-allowlist=*
      - --min-gas-price=0
      - --sync-mode=FULL

  node02:
    image: hyperledger/besu:24.10.0
    container_name: rbb-local-node02
    restart: unless-stopped
    depends_on:
      - node01
    volumes:
      - ./genesis.json:/config/genesis.json:ro
      - ./nodes/node02:/config/node:ro
      - node02-data:/data
    ports:
      - "8555:8545"
      - "30304:30303"
    networks:
      - rbb-local
    command:
      - --genesis-file=/config/genesis.json
      - --data-path=/data
      - --node-private-key-file=/config/node/key
      - --p2p-host=0.0.0.0
      - --p2p-port=30303
      - --bootnodes=enode://ab45e414c97d79307c246b887290ae6bdc880fa8b270b05fea413db8a2f7ce56d3f78ff41b44f14bfddfbb97953c89beb4b161fc8e95a8bd6a3396a1e6fbc5a6@node01:30303
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-cors-origins=*
      - --rpc-http-api=ETH,NET,WEB3,QBFT
      - --host-allowlist=*
      - --min-gas-price=0

  node03:
    image: hyperledger/besu:24.10.0
    container_name: rbb-local-node03
    restart: unless-stopped
    depends_on:
      - node01
    volumes:
      - ./genesis.json:/config/genesis.json:ro
      - ./nodes/node03:/config/node:ro
      - node03-data:/data
    ports:
      - "8565:8545"
      - "30305:30303"
    networks:
      - rbb-local
    command:
      - --genesis-file=/config/genesis.json
      - --data-path=/data
      - --node-private-key-file=/config/node/key
      - --p2p-host=0.0.0.0
      - --p2p-port=30303
      - --bootnodes=enode://ab45e414c97d79307c246b887290ae6bdc880fa8b270b05fea413db8a2f7ce56d3f78ff41b44f14bfddfbb97953c89beb4b161fc8e95a8bd6a3396a1e6fbc5a6@node01:30303
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-cors-origins=*
      - --rpc-http-api=ETH,NET,WEB3,QBFT
      - --host-allowlist=*
      - --min-gas-price=0

networks:
  rbb-local:
    driver: bridge

volumes:
  node01-data:
  node02-data:
  node03-data:
